<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shield Background -->
  <path d="M50 8 L12 20 L12 55 C12 78 28 92 50 98 C72 92 88 78 88 55 L88 20 Z" fill="#1E3A5F" />
  
  <!-- Subtle QR Code Pattern Top Left -->
  <g fill="#FFFFFF" opacity="0.25">
    <rect x="22" y="28" width="5" height="5" />
    <rect x="29" y="28" width="5" height="5" />
    <rect x="22" y="35" width="5" height="5" />
    <rect x="29" y="35" width="3" height="3" />
    <rect x="34" y="35" width="3" height="3" />
    <rect x="22" y="42" width="2" height="2" />
    <rect x="25" y="42" width="2" height="2" />
    <rect x="29" y="42" width="5" height="5" />
  </g>

  <!-- Hostel / Building Icon -->
  <path d="M30 72 L30 46 L50 35 L70 46 L70 72 Z" fill="#FFFFFF" />
  
  <!-- Windows -->
  <rect x="40" y="48" width="6" height="6" rx="1" fill="#1E3A5F" />
  <rect x="54" y="48" width="6" height="6" rx="1" fill="#1E3A5F" />
  <rect x="40" y="60" width="6" height="6" rx="1" fill="#1E3A5F" />
  <rect x="54" y="60" width="6" height="6" rx="1" fill="#1E3A5F" />

  <!-- Emerald Green Approval Badge (#22C55E) -->
  <circle cx="75" cy="75" r="20" fill="#22C55E" stroke="#FFFFFF" stroke-width="4" />
  
  <!-- Checkmark -->
  <path d="M66 75 L73 82 L84 64" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
